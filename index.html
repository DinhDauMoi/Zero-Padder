<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Padder - Công Cụ Thêm Số 0 Tự Động</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2.75rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            align-items: center;
            gap: 1rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .controls label {
            font-weight: 500;
            color: #cbd5e1;
            font-size: 1rem;
        }

        .controls input[type="number"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--primary);
            color: white;
            padding: 0.5rem;
            border-radius: 8px;
            width: 80px;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .controls input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
        }

        .input-group label {
            font-weight: 500;
            color: #cbd5e1;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 350px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.25rem;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            transition: all 0.3s ease;
            line-height: 1.6;
            font-family: monospace;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
            background: rgba(0, 0, 0, 0.3);
        }

        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.5);
            border-radius: 8px;
        }
        textarea::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        button {
            padding: 0.875rem 1.75rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(139, 92, 246, 0.39);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fecaca;
            transform: translateY(-2px);
        }

        .notification {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 50;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Loading indicator for copy button */
        .copy-success-icon {
            display: none;
        }
        .copy-active .copy-icon {
            display: none;
        }
        .copy-active .copy-success-icon {
            display: block;
            color: var(--success);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Zero Padder</h1>
            <p>Tự động điền thêm số 0 ở đầu chuỗi cho đủ độ dài yêu cầu.</p>
        </div>

        <div class="controls">
            <label for="targetLength">Độ dài bắt buộc của 1 chuỗi:</label>
            <input type="number" id="targetLength" value="8" min="1" max="50">
        </div>

        <div class="layout">
            <div class="input-group">
                <label for="inputText">
                    Dữ liệu đầu vào (Paste từ Excel)
                    <span class="badge" id="inputCount">0 dòng</span>
                </label>
                <textarea id="inputText" placeholder="Paste cột dữ liệu từ Excel vào đây...&#10;Ví dụ:&#10;123&#10;4567&#10;89&#10;&#10;Công cụ sẽ tự thêm các số 0 ở đầu để cho ra chuỗi 8 số."></textarea>
            </div>

            <div class="input-group">
                <label for="outputText">
                    Kết quả đã thêm số 0
                    <span class="badge" id="outputCount">0 dòng</span>
                </label>
                <textarea id="outputText" readonly placeholder="Kết quả sẽ tự động hiển thị ở đây..."></textarea>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="copyBtn">
                <svg class="copy-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                <svg class="copy-success-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                <span id="copyBtnText">Copy Kết Quả</span>
            </button>
            <button class="btn-danger" id="clearBtn">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Xóa Tất Cả
            </button>
        </div>
    </div>

    <div class="notification" id="notification">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>Đã copy kết quả vào Clipboard!</span>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const copyBtnText = document.getElementById('copyBtnText');
        const clearBtn = document.getElementById('clearBtn');
        const targetLengthInput = document.getElementById('targetLength');
        const notification = document.getElementById('notification');
        const inputCount = document.getElementById('inputCount');
        const outputCount = document.getElementById('outputCount');

        // Function to update line counts
        function updateCounts() {
            // Count non-empty lines for a better representation, or total lines
            const inLines = inputText.value ? inputText.value.split('\n').length : 0;
            const outLines = outputText.value ? outputText.value.split('\n').length : 0;
            inputCount.textContent = `${inLines} dòng`;
            outputCount.textContent = `${outLines} dòng`;
        }

        // Main processing function
        function processText() {
            const targetLen = parseInt(targetLengthInput.value) || 8;
            const lines = inputText.value.split('\n');
            
            const result = lines.map(line => {
                let trimmed = line.trim();
                // If the line is empty, skip padding to avoid outputting "00000000" for empty Excel rows
                if (trimmed === '') return ''; 
                
                // Add leading zeros
                return trimmed.padStart(targetLen, '0');
            });

            outputText.value = result.join('\n');
            updateCounts();
        }

        // Event listeners for auto-processing
        inputText.addEventListener('input', processText);
        targetLengthInput.addEventListener('input', processText);

        // Copy button
        copyBtn.addEventListener('click', () => {
            if (!outputText.value) {
                return;
            }
            
            navigator.clipboard.writeText(outputText.value).then(() => {
                triggerCopySuccess();
            }).catch(err => {
                console.error('Lỗi copy:', err);
                outputText.select();
                document.execCommand('copy');
                triggerCopySuccess();
            });
        });

        function triggerCopySuccess() {
            // Button animation
            copyBtn.classList.add('copy-active');
            copyBtnText.textContent = "Đã Copy!";
            
            // Show toast notification
            notification.classList.add('show');
            
            setTimeout(() => {
                copyBtn.classList.remove('copy-active');
                copyBtnText.textContent = "Copy Kết Quả";
                notification.classList.remove('show');
            }, 2500);
        }

        // Clear button
        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            outputText.value = '';
            updateCounts();
            inputText.focus();
        });
        
        // Initialize once in case browser restores values
        processText();
    </script>
</body>
</html>
